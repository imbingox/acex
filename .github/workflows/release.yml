name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".trellis/**"
      - ".github/**"
      - "docs/**"
      - "*.md"
      - "CLAUDE.md"
      - "AGENTS.md"
  workflow_dispatch:
    inputs:
      reenter_beta_mode:
        description: Re-enter Changesets beta prerelease mode after stable publish
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  beta-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global npm@11.6.2
          npm --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run type-check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Create beta release pull request or prepare publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether current beta version is already published
        id: beta-publish-state
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${PACKAGE_VERSION}"

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Current version ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping beta publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check beta npm package contents
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.beta-publish-state.outputs.already_published != 'true'
        run: bun run pack:check

      - name: Publish beta to npm
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.beta-publish-state.outputs.already_published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_TAG: beta
        run: bun run release

      - name: Ensure beta git tag exists
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          RELEASE_TAG: ${{ steps.beta-publish-state.outputs.release_tag }}
        run: |
          git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" || true

          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "${RELEASE_TAG}"
          fi

          TAG_TARGET=$(git rev-list -n 1 "${RELEASE_TAG}")
          HEAD_SHA=$(git rev-parse HEAD)

          if [ "${TAG_TARGET}" != "${HEAD_SHA}" ]; then
            echo "Tag ${RELEASE_TAG} points to ${TAG_TARGET}, not current HEAD ${HEAD_SHA}." >&2
            exit 1
          fi

      - name: Push beta git tag
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          RELEASE_TAG: ${{ steps.beta-publish-state.outputs.release_tag }}
        run: git push origin "refs/tags/${RELEASE_TAG}"

      - name: Check whether beta GitHub Release already exists
        id: beta-github-release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.beta-publish-state.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Release ${RELEASE_TAG} already exists; skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create beta GitHub Release notes
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.beta-github-release.outputs.exists != 'true'
        env:
          PACKAGE_VERSION: ${{ steps.beta-publish-state.outputs.package_version }}
        run: bun --silent run release:notes "${PACKAGE_VERSION}" > "$RUNNER_TEMP/release-notes.md"

      - name: Create beta GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.beta-github-release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.beta-publish-state.outputs.release_tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --prerelease \
            --verify-tag

  stable-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Ensure stable release runs from main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Stable release must be dispatched from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global npm@11.6.2
          npm --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run type-check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Read current stable release state
        id: stable-current-state
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            echo "stable_metadata_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable_metadata_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit prerelease mode
        if: steps.stable-current-state.outputs.stable_metadata_ready != 'true'
        run: bun run changeset:pre:exit

      - name: Version packages for stable release
        if: steps.stable-current-state.outputs.stable_metadata_ready != 'true'
        run: bun run version-packages

      - name: Ensure stable release produced changes
        if: steps.stable-current-state.outputs.stable_metadata_ready != 'true'
        run: |
          if git diff --quiet; then
            echo "No stable release changes were generated. The repository may already be out of prerelease mode or there is nothing new to release." >&2
            exit 1
          fi

      - name: Check whether target stable version is already published
        id: stable-publish-state
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="v${PACKAGE_VERSION}"

          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            echo "Stable release target must not be a prerelease version: ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Target version ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping stable npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "github_release_exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Release ${RELEASE_TAG} already exists; skipping creation."
          else
            echo "github_release_exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create stable release metadata pull request
        if: steps.stable-current-state.outputs.stable_metadata_ready != 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          commit-message: "chore(release): publish stable v${{ steps.stable-publish-state.outputs.package_version }} [skip release]"
          title: "chore(release): publish stable v${{ steps.stable-publish-state.outputs.package_version }} [skip release]"
          body: |
            Generated by the stable release workflow.

            Merge this PR, then dispatch the release workflow again from main to publish v${{ steps.stable-publish-state.outputs.package_version }}.
          branch: changeset-stable-release/main
          delete-branch: true

      - name: Check stable npm package contents
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true' && steps.stable-publish-state.outputs.already_published != 'true'
        run: bun run pack:check

      - name: Create stable GitHub Release notes
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true' && steps.stable-publish-state.outputs.github_release_exists != 'true'
        env:
          PACKAGE_VERSION: ${{ steps.stable-publish-state.outputs.package_version }}
        run: bun --silent run release:notes "${PACKAGE_VERSION}" > "$RUNNER_TEMP/release-notes.md"

      - name: Publish stable to npm
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true' && steps.stable-publish-state.outputs.already_published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: true
        run: bun run release

      - name: Ensure stable git tag exists
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true'
        env:
          RELEASE_TAG: ${{ steps.stable-publish-state.outputs.release_tag }}
        run: |
          git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" || true

          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "${RELEASE_TAG}"
          fi

          TAG_TARGET=$(git rev-list -n 1 "${RELEASE_TAG}")
          HEAD_SHA=$(git rev-parse HEAD)

          if [ "${TAG_TARGET}" != "${HEAD_SHA}" ]; then
            echo "Tag ${RELEASE_TAG} points to ${TAG_TARGET}, not current HEAD ${HEAD_SHA}." >&2
            exit 1
          fi

      - name: Push stable git tag
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true'
        env:
          RELEASE_TAG: ${{ steps.stable-publish-state.outputs.release_tag }}
        run: git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create stable GitHub Release
        if: steps.stable-current-state.outputs.stable_metadata_ready == 'true' && steps.stable-publish-state.outputs.github_release_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.stable-publish-state.outputs.release_tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --latest \
            --verify-tag

      - name: Re-enter beta prerelease mode
        id: beta-pre-state
        if: ${{ steps.stable-current-state.outputs.stable_metadata_ready == 'true' && inputs.reenter_beta_mode }}
        run: |
          PRE_MODE=$(node -e "const fs = require('node:fs'); try { const pre = JSON.parse(fs.readFileSync('.changeset/pre.json', 'utf8')); process.stdout.write(String(pre.mode ?? '')); } catch {}")

          if [ "${PRE_MODE}" = "pre" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already in beta prerelease mode; skipping."
            exit 0
          fi

          bun run changeset:pre:enter:beta

          if [ -n "$(git status --porcelain -- .changeset/pre.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create beta prerelease metadata pull request
        if: ${{ inputs.reenter_beta_mode && steps.beta-pre-state.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN }}
          commit-message: "chore(release): re-enter beta prerelease mode [skip release]"
          title: "chore(release): re-enter beta prerelease mode [skip release]"
          body: Generated by the stable release workflow after publishing v${{ steps.stable-publish-state.outputs.package_version }}.
          branch: changeset-beta-prerelease/main
          delete-branch: true
